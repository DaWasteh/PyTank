name: CI - PyTank

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYTHONUNBUFFERED: "1"

    strategy:
      fail-fast: false
      matrix:
        # Pygame is currently safest for this project on 3.10-3.12.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies for pygame
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libsdl2-gfx-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile pytank.py

      - name: Lint with flake8
        run: |
          python -m flake8 pytank.py tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m flake8 pytank.py tests/ --count --statistics --max-line-length=120

      - name: Run start smoke test
        run: python tests/test_start.py

      - name: Run sound smoke test
        run: python tests/test_sound.py

      - name: Run exe helper smoke test
        run: python tests/test_exe.py
