name: CI - PyTank

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libsdl2-gfx-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest
        
    - name: Lint with flake8
      run: |
        flake8 pytank.py tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 pytank.py tests/ --count --statistics --max-line-length=120
        
    - name: Run test_start.py
      run: |
        xvfb-run python tests/test_start.py
        
    - name: Run test_sound.py
      run: |
        xvfb-run python tests/test_sound.py
        
    - name: Run test_exe.py
      run: |
        xvfb-run python tests/test_exe.py
